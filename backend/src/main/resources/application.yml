spring:
  web:
    error:
      include-message: always
      include-binding-errors: always

  datasource:
    url: jdbc:postgresql://localhost:5432/registration
    username: YOUR_USERNAME
    password: YOUR_PASSWORD

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": true
